<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="dataBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="vaultBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="aiBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#a5f3fc"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowBack" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- BG -->
  <rect width="920" height="540" fill="#fafafa"/>

  <!-- Column 1: YOUR DATA -->
  <rect x="20" y="40" width="240" height="380" rx="14" fill="url(#dataBg)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="140" y="70" text-anchor="middle" font-size="16" font-weight="700" fill="#7c2d12">YOUR DATA</text>
  <text x="140" y="90" text-anchor="middle" font-size="11" fill="#9a3412">scattered across many sources</text>

  <g font-size="13" fill="#7c2d12">
    <text x="40" y="125">📅  Calendar</text>
    <text x="40" y="155">✉️  Gmail</text>
    <text x="40" y="185">💬  Slack</text>
    <text x="40" y="215">📝  Notion</text>
    <text x="40" y="245">📋  Linear</text>
    <text x="40" y="275">🎙️  Granola</text>
    <text x="40" y="305">🐙  GitHub PRs</text>
    <text x="40" y="335">📂  Google Drive</text>
    <text x="40" y="365">…</text>
    <text x="40" y="395" font-size="11" fill="#9a3412" font-style="italic">any source with an MCP</text>
  </g>

  <!-- Column 2: YOUR VAULT -->
  <rect x="340" y="40" width="240" height="380" rx="14" fill="url(#vaultBg)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="460" y="70" text-anchor="middle" font-size="16" font-weight="700" fill="#4c1d95">YOUR VAULT</text>
  <text x="460" y="90" text-anchor="middle" font-size="11" fill="#5b21b6">plain markdown — you own it</text>

  <g font-size="13" fill="#4c1d95">
    <text x="360" y="130">🟣  Obsidian-compatible</text>
    <text x="360" y="155" font-size="11" fill="#5b21b6">(or VS Code · iA Writer · plain text)</text>
    <line x1="360" y1="170" x2="560" y2="170" stroke="#a78bfa" stroke-width="1"/>
    <text x="360" y="195">📄  entities/</text>
    <text x="380" y="215" font-size="11" fill="#5b21b6">people · companies · projects · teams</text>
    <text x="380" y="232" font-size="11" fill="#5b21b6">topics · surfaces (channels, folders)</text>
    <text x="360" y="260">📄  memories/</text>
    <text x="380" y="280" font-size="11" fill="#5b21b6">decisions · events · project_facts</text>
    <text x="380" y="297" font-size="11" fill="#5b21b6">references · relationships · feedback</text>
    <text x="360" y="325">🗂️  alias map · in-degree</text>
    <text x="360" y="345">🌳  parent_surface tree</text>
    <text x="360" y="365">📊  fill_quality · pollution · eval</text>
    <text x="360" y="395" font-size="11" fill="#5b21b6" font-style="italic">~1ms retrieval, deterministic</text>
  </g>

  <!-- Column 3: YOUR AI TOOLS -->
  <rect x="660" y="40" width="240" height="380" rx="14" fill="url(#aiBg)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="780" y="70" text-anchor="middle" font-size="16" font-weight="700" fill="#164e63">YOUR AI TOOLS</text>
  <text x="780" y="90" text-anchor="middle" font-size="11" fill="#155e75">via CLI or MCP</text>

  <g font-size="13" fill="#164e63">
    <text x="680" y="125">🤖  Claude Code</text>
    <text x="700" y="143" font-size="11" fill="#155e75">(MCP + skills, primary)</text>
    <text x="680" y="170">⌨️  Cursor / Continue / Cline</text>
    <text x="700" y="188" font-size="11" fill="#155e75">(MCP + paste skills)</text>
    <text x="680" y="215">🅰️  Anthropic API / Claude.ai</text>
    <text x="700" y="233" font-size="11" fill="#155e75">(MCP)</text>
    <text x="680" y="260">🟢  OpenAI Agents SDK</text>
    <text x="700" y="278" font-size="11" fill="#155e75">(MCP)</text>
    <text x="680" y="305">💎  Gemini · any MCP client</text>
    <text x="700" y="323" font-size="11" fill="#155e75">(MCP)</text>
    <line x1="680" y1="345" x2="880" y2="345" stroke="#67e8f9" stroke-width="1"/>
    <text x="680" y="368">💻  mv CLI (terminal)</text>
    <text x="700" y="386" font-size="11" fill="#155e75">setup · ask · eval · doctor · migrate</text>
  </g>

  <!-- Arrow 1: data -> vault (scouring) -->
  <line x1="262" y1="220" x2="338" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">scouring agents</text>
  <text x="300" y="238" text-anchor="middle" font-size="10" fill="#475569">wake on schedule ·</text>
  <text x="300" y="252" text-anchor="middle" font-size="10" fill="#475569">per-source strategy</text>

  <!-- Arrow 2: vault -> AI -->
  <line x1="582" y1="220" x2="658" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="620" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">memory_ask</text>
  <text x="620" y="238" text-anchor="middle" font-size="10" fill="#475569">via MCP or CLI</text>

  <!-- Feedback arrow: AI -> vault (curved, bottom) -->
  <path d="M 780,425 Q 780,490 460,490 Q 460,480 460,440" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrowBack)"/>
  <text x="620" y="510" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">use sharpens it · quality compounds over time</text>
  <text x="620" y="525" text-anchor="middle" font-size="10" fill="#7c3aed">(gaps detected, syntheses fed back via memory_annotate, queue drained nightly)</text>

</svg>
